<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var key = 'tpl-theme';
        var theme = localStorage.getItem(key);
        var isLight = theme === 'luxury-light';
        var resolved = isLight ? 'luxury-light' : 'dark';
        var bg = isLight ? '#d9d0c3' : '#050505';
        var root = document.documentElement;
        root.dataset.theme = resolved;
        root.style.colorScheme = isLight ? 'light' : 'dark';
        root.style.backgroundColor = bg;
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', bg);
      })();
    </script>
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <meta
      name="description"
      content="Triumph Plaza Hotel Laundry is a premium hotel laundry operations application for inventory, shifts, training, care references, pricing, and admin management."
    />
    <meta name="application-name" content="Triumph Plaza Hotel Laundry" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="TPL Laundry" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="msapplication-TileColor" content="#050505" />
    <meta name="msapplication-TileImage" content="/icons/icon-144.png" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Triumph Plaza Hotel Laundry" />
    <meta
      property="og:description"
      content="Premium luxury hotel laundry operations management for Triumph Plaza Hotel."
    />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta property="og:site_name" content="Triumph Plaza Hotel Laundry" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Triumph Plaza Hotel Laundry" />
    <meta
      name="twitter:description"
      content="Premium luxury hotel laundry operations management for Triumph Plaza Hotel."
    />
    <meta name="twitter:image" content="/icons/icon-512.png" />
    <title>Triumph Plaza Hotel Laundry</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
